<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تایمر پومودورو | SA-APPS</title>
  <style>
    :root{
      --bg:#0b1220;
      --bg2:#0f172a;
      --text:#e8eefc;
      --muted:#9fb0d0;
      --accent:#6ea8fe;
      --accent2:#8b5cf6;
      --success:#22c55e;
      --warning:#f59e0b;
      --danger:#ef4444;
      --border:rgba(255,255,255,.08);
      --shadow:0 18px 50px rgba(0,0,0,.45);
      --glass:blur(14px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:Tahoma, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(110,168,254,.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(139,92,246,.16), transparent 34%),
        linear-gradient(180deg,#09111d,#0b1220);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .app{
      width:100%;
      max-width:430px;
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border:1px solid var(--border);
      border-radius:28px;
      padding:20px;
      backdrop-filter:var(--glass);
      -webkit-backdrop-filter:var(--glass);
      box-shadow:var(--shadow);
    }

    .header{
      text-align:center;
      margin-bottom:18px;
    }

    .icon{
      width:68px;
      height:68px;
      margin:0 auto 12px;
      border-radius:20px;
      display:grid;
      place-items:center;
      font-size:30px;
      background:linear-gradient(135deg, rgba(110,168,254,.25), rgba(139,92,246,.22));
      border:1px solid rgba(255,255,255,.08);
    }

    h1{
      margin:0;
      font-size:24px;
    }

    .subtitle{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.8;
    }

    .modes{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin:18px 0 20px;
    }

    .mode-btn{
      border:none;
      border-radius:14px;
      padding:12px 8px;
      background:rgba(255,255,255,.05);
      color:var(--text);
      border:1px solid var(--border);
      font-family:inherit;
      font-size:13px;
      cursor:pointer;
      transition:.2s ease;
    }

    .mode-btn.active{
      background:linear-gradient(135deg, rgba(110,168,254,.25), rgba(139,92,246,.22));
      border-color:rgba(110,168,254,.35);
    }

    .timer-wrap{
      display:flex;
      justify-content:center;
      margin:12px 0 20px;
    }

    .progress-ring{
      position:relative;
      width:260px;
      height:260px;
    }

    .progress-ring svg{
      width:100%;
      height:100%;
      transform:rotate(-90deg);
    }

    .progress-bg{
      fill:none;
      stroke:rgba(255,255,255,.08);
      stroke-width:10;
    }

    .progress-bar{
      fill:none;
      stroke:url(#ringGradient);
      stroke-width:10;
      stroke-linecap:round;
      stroke-dasharray:754;
      stroke-dashoffset:0;
      transition:stroke-dashoffset .6s linear;
    }

    .time-display{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .status{
      color:var(--muted);
      font-size:14px;
      margin-bottom:8px;
    }

    .time{
      font-size:44px;
      font-weight:bold;
      letter-spacing:1px;
    }

    .session-count{
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
    }

    .controls{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:6px;
    }

    .btn{
      border:none;
      border-radius:16px;
      padding:14px 10px;
      font-family:inherit;
      font-size:14px;
      font-weight:bold;
      cursor:pointer;
      color:#fff;
      transition:.2s ease;
    }

    .btn:active{
      transform:scale(.98);
    }

    .btn-start{
      background:linear-gradient(135deg, #22c55e, #16a34a);
    }

    .btn-pause{
      background:linear-gradient(135deg, #f59e0b, #d97706);
    }

    .btn-reset{
      background:linear-gradient(135deg, #ef4444, #dc2626);
    }

    .note{
      margin-top:16px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
    }

    .back-link{
      display:block;
      text-align:center;
      margin-top:18px;
      color:#cbd5e1;
      text-decoration:none;
      font-size:14px;
    }

    @media (max-width:420px){
      .progress-ring{
        width:220px;
        height:220px;
      }

      .time{
        font-size:38px;
      }

      .modes{
        grid-template-columns:1fr;
      }

      .controls{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="icon">⏱</div>
      <h1>تایمر پومودورو</h1>
      <div class="subtitle">تمرکز کن، استراحت کن، دوباره با انرژی ادامه بده.</div>
    </div>

    <div class="modes">
      <button class="mode-btn active" data-mode="focus" data-minutes="25">تمرکز</button>
      <button class="mode-btn" data-mode="short" data-minutes="5">استراحت کوتاه</button>
      <button class="mode-btn" data-mode="long" data-minutes="15">استراحت بلند</button>
    </div>

    <div class="timer-wrap">
      <div class="progress-ring">
        <svg viewBox="0 0 260 260">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6ea8fe"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
          <circle class="progress-bg" cx="130" cy="130" r="120"></circle>
          <circle class="progress-bar" id="progressBar" cx="130" cy="130" r="120"></circle>
        </svg>

        <div class="time-display">
          <div class="status" id="statusText">حالت تمرکز</div>
          <div class="time" id="timeText">25:00</div>
          <div class="session-count" id="sessionCount">پومودوروهای کامل: 0</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-start" onclick="startTimer()">شروع</button>
      <button class="btn btn-pause" onclick="pauseTimer()">توقف</button>
      <button class="btn btn-reset" onclick="resetTimer()">ریست</button>
    </div>

    <div class="note">
      بعد از هر جلسه تمرکز، چند دقیقه استراحت کن تا بازدهی‌ات بیشتر شود.
    </div>

    <a class="back-link" href="index.html">← بازگشت به لانچر</a>
  </div>

  <script>
    const FULL_DASH_ARRAY = 754;
    const progressBar = document.getElementById("progressBar");
    const timeText = document.getElementById("timeText");
    const statusText = document.getElementById("statusText");
    const sessionCountText = document.getElementById("sessionCount");
    const modeButtons = document.querySelectorAll(".mode-btn");

    let timer = null;
    let totalSeconds = 25 * 60;
    let remainingSeconds = totalSeconds;
    let currentMode = "focus";
    let completedPomodoros = 0;
    let isRunning = false;

    function updateDisplay() {
      const minutes = String(Math.floor(remainingSeconds / 60)).padStart(2, "0");
      const seconds = String(remainingSeconds % 60).padStart(2, "0");
      timeText.textContent = `${minutes}:${seconds}`;

      const progress = remainingSeconds / totalSeconds;
      const dashOffset = FULL_DASH_ARRAY * (1 - progress);
      progressBar.style.strokeDashoffset = dashOffset;

      sessionCountText.textContent = `پومودوروهای کامل: ${completedPomodoros}`;
    }

    function setMode(mode, minutes) {
      currentMode = mode;
      totalSeconds = minutes * 60;
      remainingSeconds = totalSeconds;
      clearInterval(timer);
      timer = null;
      isRunning = false;

      if (mode === "focus") statusText.textContent = "حالت تمرکز";
      if (mode === "short") statusText.textContent = "استراحت کوتاه";
      if (mode === "long") statusText.textContent = "استراحت بلند";

      modeButtons.forEach(btn => btn.classList.remove("active"));
      document.querySelector(`[data-mode="${mode}"]`).classList.add("active");

      updateDisplay();
    }

    function startTimer() {
      if (isRunning) return;

      isRunning = true;
      timer = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds--;
          updateDisplay();
        } else {
          clearInterval(timer);
          timer = null;
          isRunning = false;

          if (currentMode === "focus") {
            completedPomodoros++;
            sessionCountText.textContent = `پومودوروهای کامل: ${completedPomodoros}`;
          }

          alert("زمان این بخش تمام شد.");
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timer);
      timer = null;
      isRunning = false;
    }

    function resetTimer() {
      const activeBtn = document.querySelector(".mode-btn.active");
      const minutes = Number(activeBtn.dataset.minutes);
      setMode(activeBtn.dataset.mode, minutes);
    }

    modeButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        setMode(btn.dataset.mode, Number(btn.dataset.minutes));
      });
    });

    updateDisplay();
  </script>
</body>
</html>
