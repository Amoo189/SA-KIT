<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تبدیل مبنای اعداد - SA</title>
  <style>
    @font-face{
      font-family:"VazirmatnLocal";
      src:url("fonts/Vazirmatn-Regular.woff2") format("woff2");
      font-weight:400;
    }

    :root{
      --bg:#0b1220;
      --bg2:#0f172a;
      --text:#e8eefc;
      --muted:#9fb0d0;
      --accent:#6ea8fe;
      --accent2:#8b5cf6;
      --border:rgba(255,255,255,.08);
      --glass:blur(14px);
      --radius:20px;
    }

    body.light-mode {
      --bg: #f0f4f9;
      --bg2: #ffffff;
      --text: #1a202c;
      --muted: #6b7280;
      --border: rgba(0,0,0,0.1);
    }

    body{
      margin:0;
      padding:20px;
      font-family:"VazirmatnLocal", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.3s;
    }

    .app-card {
      width: min(500px, 95%);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      backdrop-filter: var(--glass);
      border-radius: 32px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    .icon-box {
      width: 50px; height: 50px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 15px;
      display: grid; place-items: center;
      font-size: 24px;
    }

    h1 { font-size: 20px; margin: 0; }
    p.desc { color: var(--muted); font-size: 13px; margin: 5px 0 0; }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--accent);
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: monospace;
      font-size: 16px;
      box-sizing: border-box;
      transition: 0.3s;
      text-align: left;
      direction: ltr;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 15px rgba(110,168,254,0.2);
    }

    .btn-back {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      transition: 0.3s;
    }

    .btn-back:hover { color: var(--accent); }

    .error {
        color: #ff6b6b;
        font-size: 11px;
        margin-top: 5px;
        height: 15px;
    }

    .light-mode input { background: rgba(0,0,0,0.05); color: #000; }
  </style>
</head>
<body class="dark-mode"> <!-- بر اساس تم لانچر ست شود -->

  <div class="app-card">
    <div class="header">
      <div class="icon-box">🔢</div>
      <div>
        <h1>تبدیل‌گر مبنای اعداد</h1>
        <p class="desc">تبدیل آنی بین مبناهای ۲، ۸، ۱۰ و ۱۶</p>
      </div>
    </div>

    <div class="input-group">
      <label>دهدهی (Decimal - Base 10)</label>
      <input type="text" id="dec" placeholder="مثلا: 255" oninput="convert(this, 10)">
      <div id="err-10" class="error"></div>
    </div>

    <div class="input-group">
      <label>باینری (Binary - Base 2)</label>
      <input type="text" id="bin" placeholder="مثلا: 11111111" oninput="convert(this, 2)">
      <div id="err-2" class="error"></div>
    </div>

    <div class="input-group">
      <label>هگزادسیمال (Hex - Base 16)</label>
      <input type="text" id="hex" placeholder="مثلا: FF" oninput="convert(this, 16)">
      <div id="err-16" class="error"></div>
    </div>

    <div class="input-group">
      <label>هشت‌هشتی (Octal - Base 8)</label>
      <input type="text" id="oct" placeholder="مثلا: 377" oninput="convert(this, 8)">
      <div id="err-8" class="error"></div>
    </div>

    <a href="index.html" class="btn-back">بازگشت به لانچر →</a>
  </div>

  <script>
    // هماهنگی تم با لکال استوریج لانچر
    if(localStorage.getItem("sa-apps-theme") === "light") {
        document.body.classList.replace("dark-mode", "light-mode");
    }

    function convert(el, base) {
      const val = el.value.trim();
      const fields = {
        10: document.getElementById('dec'),
        2: document.getElementById('bin'),
        16: document.getElementById('hex'),
        8: document.getElementById('oct')
      };
      
      // پاک کردن خطاها
      document.querySelectorAll('.error').forEach(e => e.textContent = '');

      if(!val) {
        Object.values(fields).forEach(f => f.value = '');
        return;
      }

      try {
        // تبدیل ورودی به عدد دهدهی
        const decimalValue = parseInt(val, base);

        if (isNaN(decimalValue)) {
            throw new Error("فرمت نامعتبر");
        }

        // بروزرسانی سایر فیلدها
        if(base !== 10) fields[10].value = decimalValue.toString(10);
        if(base !== 2)  fields[2].value  = decimalValue.toString(2);
        if(base !== 16) fields[16].value = decimalValue.toString(16).toUpperCase();
        if(base !== 8)  fields[8].value  = decimalValue.toString(8);

      } catch (e) {
        document.getElementById(`err-${base}`).textContent = "عدد وارد شده در این مبنا معتبر نیست.";
      }
    }
  </script>
</body>
</html>
