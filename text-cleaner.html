<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پاک‌ساز متن | SA-APPS</title>
  <style>
    @font-face {
      font-family: "VazirmatnLocal";
      src: url("fonts/Vazirmatn-Regular.woff2") format("woff2");
      font-display: swap;
    }

    :root {
      --bg: #07111f;
      --bg-2: #0d1b2f;
      --panel: rgba(255,255,255,.08);
      --panel-border: rgba(255,255,255,.14);
      --text: #ecf3ff;
      --muted: #adc3df;
      --primary: #5eead4;
      --secondary: #60a5fa;
      --accent: #c084fc;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --input: rgba(255,255,255,.07);
    }

    body.light {
      --bg: #eef6ff;
      --bg-2: #dfefff;
      --panel: rgba(255,255,255,.65);
      --panel-border: rgba(255,255,255,.75);
      --text: #102033;
      --muted: #4e647d;
      --primary: #0ea5e9;
      --secondary: #2563eb;
      --accent: #9333ea;
      --shadow: 0 10px 30px rgba(31,41,55,.12);
      --input: rgba(255,255,255,.7);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "VazirmatnLocal", sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(96,165,250,.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(192,132,252,.16), transparent 30%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
    }

    .container {
      width: min(1200px, calc(100% - 24px));
      margin: 24px auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .title-box {
      flex: 1;
      min-width: 280px;
    }

    h1 { margin: 0 0 8px; }
    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.9;
    }

    .actions, .tool-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn, .check {
      font-family: inherit;
    }

    .btn {
      border: 1px solid var(--panel-border);
      background: var(--panel);
      color: var(--text);
      border-radius: 16px;
      padding: 12px 16px;
      cursor: pointer;
      text-decoration: none;
      transition: .2s ease;
    }

    .btn:hover { transform: translateY(-2px); }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    textarea {
      width: 100%;
      min-height: 360px;
      resize: vertical;
      border: 1px solid transparent;
      background: var(--input);
      color: var(--text);
      border-radius: 18px;
      padding: 16px;
      font-family: inherit;
      font-size: .98rem;
      line-height: 2;
      outline: none;
    }

    textarea:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 0 4px rgba(96,165,250,.14);
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      color: var(--text);
      cursor: pointer;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .stat {
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--panel-border);
      color: var(--muted);
      font-size: .92rem;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel topbar">
      <div class="title-box">
        <h1>🧹 پاک‌ساز متن</h1>
        <p class="subtitle">حذف فاصله‌های اضافی، خطوط خالی، یکدست‌سازی متن و آماده‌سازی سریع برای کپی یا استفاده مجدد</p>
      </div>
      <div class="actions">
        <button class="btn" id="themeToggle">تغییر تم</button>
        <a href="index.html" class="btn">بازگشت به لانچر</a>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>متن ورودی</h2>
        <textarea id="inputText" placeholder="متن خود را اینجا وارد یا paste کنید..."></textarea>
        <div class="stats">
          <div class="stat" id="inputChars">تعداد کاراکتر: 0</div>
          <div class="stat" id="inputWords">تعداد کلمه: 0</div>
          <div class="stat" id="inputLines">تعداد خط: 0</div>
        </div>
      </div>

      <div class="panel">
        <h2>تنظیمات پاک‌سازی</h2>
        <div class="options">
          <label class="check"><input type="checkbox" id="trimLines" checked> حذف فاصله ابتدا و انتهای هر خط</label>
          <label class="check"><input type="checkbox" id="removeEmptyLines" checked> حذف خطوط خالی</label>
          <label class="check"><input type="checkbox" id="collapseSpaces" checked> تبدیل چند فاصله به یک فاصله</label>
          <label class="check"><input type="checkbox" id="normalizeNewlines"> یکدست‌سازی خط‌های جدید</label>
        </div>

        <div class="tool-actions">
          <button class="btn" id="cleanBtn">پاک‌سازی متن</button>
          <button class="btn" id="copyBtn">کپی خروجی</button>
          <button class="btn" id="swapBtn">جایگزینی با ورودی</button>
          <button class="btn" id="clearBtn">پاک کردن همه</button>
        </div>

        <h2 style="margin-top:18px;">خروجی</h2>
        <textarea id="outputText" placeholder="خروجی پاک‌سازی‌شده اینجا نمایش داده می‌شود..."></textarea>

        <div class="stats">
          <div class="stat" id="outputChars">تعداد کاراکتر: 0</div>
          <div class="stat" id="outputWords">تعداد کلمه: 0</div>
          <div class="stat" id="outputLines">تعداد خط: 0</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const themeKey = "sa-apps-theme";
    const body = document.body;
    if (localStorage.getItem(themeKey) === "light") body.classList.add("light");

    document.getElementById("themeToggle").addEventListener("click", () => {
      body.classList.toggle("light");
      localStorage.setItem(themeKey, body.classList.contains("light") ? "light" : "dark");
    });

    const inputText = document.getElementById("inputText");
    const outputText = document.getElementById("outputText");

    const trimLines = document.getElementById("trimLines");
    const removeEmptyLines = document.getElementById("removeEmptyLines");
    const collapseSpaces = document.getElementById("collapseSpaces");
    const normalizeNewlines = document.getElementById("normalizeNewlines");

    function getStats(text) {
      const chars = text.length;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      const lines = text ? text.split(/\n/).length : 0;
      return { chars, words, lines };
    }

    function renderStats(text, prefix) {
      const stats = getStats(text);
      document.getElementById(prefix + "Chars").textContent = `تعداد کاراکتر: ${stats.chars}`;
      document.getElementById(prefix + "Words").textContent = `تعداد کلمه: ${stats.words}`;
      document.getElementById(prefix + "Lines").textContent = `تعداد خط: ${stats.lines}`;
    }

    function cleanText(text) {
      let result = text;

      if (normalizeNewlines.checked) {
        result = result.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      }

      let lines = result.split("\n");

      if (trimLines.checked) {
        lines = lines.map(line => line.trim());
      }

      if (collapseSpaces.checked) {
        lines = lines.map(line => line.replace(/[ \t]{2,}/g, " "));
      }

      if (removeEmptyLines.checked) {
        lines = lines.filter(line => line.trim() !== "");
      }

      return lines.join("\n");
    }

    document.getElementById("cleanBtn").addEventListener("click", () => {
      outputText.value = cleanText(inputText.value);
      renderStats(outputText.value, "output");
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(outputText.value);
        const btn = document.getElementById("copyBtn");
        const old = btn.textContent;
        btn.textContent = "کپی شد!";
        setTimeout(() => btn.textContent = old, 1200);
      } catch {
        alert("کپی انجام نشد.");
      }
    });

    document.getElementById("swapBtn").addEventListener("click", () => {
      inputText.value = outputText.value;
      renderStats(inputText.value, "input");
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      inputText.value = "";
      outputText.value = "";
      renderStats("", "input");
      renderStats("", "output");
    });

    inputText.addEventListener("input", () => renderStats(inputText.value, "input"));
    outputText.addEventListener("input", () => renderStats(outputText.value, "output"));

    renderStats("", "input");
    renderStats("", "output");
  </script>
</body>
</html>
