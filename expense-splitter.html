<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تقسیم هزینه | SA-APPS</title>
  <style>
    @font-face{
      font-family:"VazirmatnLocal";
      src:url("fonts/Vazirmatn-Regular.woff2") format("woff2");
      font-display:swap;
    }

    :root{
      --bg1:#0b1020;
      --bg2:#111831;
      --text:#ecf3ff;
      --muted:#a9b7d3;
      --card:rgba(255,255,255,.09);
      --border:rgba(255,255,255,.16);
      --primary:#7c5cff;
      --primary-2:#00d4ff;
      --success:#1ec98f;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --input-bg:rgba(255,255,255,.07);
    }

    body.light{
      --bg1:#eef4ff;
      --bg2:#dfe9ff;
      --text:#13203a;
      --muted:#52627e;
      --card:rgba(255,255,255,.68);
      --border:rgba(19,32,58,.12);
      --primary:#5b4bff;
      --primary-2:#009dff;
      --success:#159a75;
      --shadow:0 10px 30px rgba(37,55,94,.12);
      --input-bg:rgba(255,255,255,.72);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:"VazirmatnLocal",system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(124,92,255,.22), transparent 26%),
        radial-gradient(circle at bottom left, rgba(0,212,255,.16), transparent 24%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      overflow-x:hidden;
    }

    .orb{
      position:fixed;
      border-radius:50%;
      filter:blur(40px);
      opacity:.22;
      z-index:0;
      pointer-events:none;
    }
    .orb1{width:220px;height:220px;background:#7c5cff;top:60px;right:40px;}
    .orb2{width:260px;height:260px;background:#00d4ff;bottom:40px;left:30px;}

    .container{
      position:relative;
      z-index:1;
      width:min(1100px,92%);
      margin:30px auto 60px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:22px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .logo{
      width:52px;
      height:52px;
      border-radius:18px;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      display:grid;
      place-items:center;
      color:#fff;
      font-size:26px;
      box-shadow:var(--shadow);
    }

    .brand h1{margin:0;font-size:1.35rem}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:.92rem}

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;
      padding:12px 16px;
      border-radius:14px;
      font-family:inherit;
      font-size:.95rem;
      color:var(--text);
      background:var(--card);
      border:1px solid var(--border);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      transition:.25s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .btn:hover{transform:translateY(-2px)}
    .btn.primary{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;
      border:none;
    }

    .grid{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:18px;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      border-radius:24px;
      padding:20px;
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }

    .panel h2{
      margin:0 0 16px;
      font-size:1.05rem;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .field label{
      color:var(--muted);
      font-size:.92rem;
    }

    input{
      width:100%;
      border:none;
      outline:none;
      padding:13px 14px;
      border-radius:14px;
      font-family:inherit;
      font-size:.98rem;
      background:var(--input-bg);
      color:var(--text);
      border:1px solid var(--border);
    }

    .full{grid-column:1 / -1}

    .result-main{
      background:rgba(30,201,143,.12);
      border:1px solid rgba(30,201,143,.24);
      border-radius:20px;
      padding:18px;
      margin-bottom:14px;
    }

    .result-main .title{
      color:var(--muted);
      margin-bottom:8px;
    }

    .result-main .big{
      font-size:1.8rem;
      font-weight:800;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .stat{
      background:var(--input-bg);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
    }

    .stat .label{
      color:var(--muted);
      font-size:.9rem;
      margin-bottom:8px;
    }

    .stat .value{
      font-size:1.12rem;
      font-weight:700;
    }

    .note{
      margin-top:12px;
      color:var(--muted);
      line-height:1.9;
      font-size:.93rem;
    }

    @media (max-width: 860px){
      .grid{grid-template-columns:1fr}
      .form-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo">🧾</div>
        <div>
          <h1>تقسیم هزینه</h1>
          <p>تقسیم مبلغ بین چند نفر با مالیات و انعام</p>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="themeToggle">🌓 تغییر تم</button>
        <a class="btn primary" href="index.html">← بازگشت به لانچر</a>
      </div>
    </div>

    <div class="grid">
      <section class="panel">
        <h2>اطلاعات هزینه</h2>
        <div class="form-grid">
          <div class="field">
            <label for="amount">مبلغ کل</label>
            <input id="amount" type="number" min="0" step="0.01" value="1000000">
          </div>

          <div class="field">
            <label for="people">تعداد افراد</label>
            <input id="people" type="number" min="1" step="1" value="4">
          </div>

          <div class="field">
            <label for="tax">درصد مالیات (%)</label>
            <input id="tax" type="number" min="0" step="0.1" value="9">
          </div>

          <div class="field">
            <label for="tip">درصد انعام (%)</label>
            <input id="tip" type="number" min="0" step="0.1" value="10">
          </div>

          <div class="field full">
            <button class="btn primary" id="calcBtn">محاسبه</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>خروجی</h2>

        <div class="result-main">
          <div class="title">سهم هر نفر</div>
          <div class="big" id="perPerson">-</div>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="label">مبلغ پایه</div>
            <div class="value" id="baseAmount">-</div>
          </div>
          <div class="stat">
            <div class="label">مالیات</div>
            <div class="value" id="taxAmount">-</div>
          </div>
          <div class="stat">
            <div class="label">انعام</div>
            <div class="value" id="tipAmount">-</div>
          </div>
          <div class="stat">
            <div class="label">مبلغ نهایی</div>
            <div class="value" id="finalAmount">-</div>
          </div>
        </div>

        <div class="note">
          می‌توانید درصد مالیات و انعام را صفر بگذارید تا فقط تقسیم ساده مبلغ بین افراد انجام شود.
        </div>
      </section>
    </div>
  </div>

  <script>
    const body = document.body;
    const themeToggle = document.getElementById('themeToggle');

    function applyTheme(theme){
      body.classList.toggle('light', theme === 'light');
      localStorage.setItem('sa-apps-theme', theme);
    }

    applyTheme(localStorage.getItem('sa-apps-theme') || 'dark');

    themeToggle.addEventListener('click', () => {
      applyTheme(body.classList.contains('light') ? 'dark' : 'light');
    });

    const amount = document.getElementById('amount');
    const people = document.getElementById('people');
    const tax = document.getElementById('tax');
    const tip = document.getElementById('tip');

    const perPerson = document.getElementById('perPerson');
    const baseAmount = document.getElementById('baseAmount');
    const taxAmount = document.getElementById('taxAmount');
    const tipAmount = document.getElementById('tipAmount');
    const finalAmount = document.getElementById('finalAmount');

    function formatMoney(val){
      return `${Math.round(val).toLocaleString('fa-IR')} تومان`;
    }

    function calculate(){
      const a = parseFloat(amount.value);
      const p = parseInt(people.value);
      const t = parseFloat(tax.value) || 0;
      const ti = parseFloat(tip.value) || 0;

      if(isNaN(a) || isNaN(p) || a < 0 || p <= 0){
        perPerson.textContent = 'مقادیر نامعتبر';
        baseAmount.textContent = '-';
        taxAmount.textContent = '-';
        tipAmount.textContent = '-';
        finalAmount.textContent = '-';
        return;
      }

      const taxVal = a * (t / 100);
      const tipVal = a * (ti / 100);
      const total = a + taxVal + tipVal;
      const each = total / p;

      perPerson.textContent = formatMoney(each);
      baseAmount.textContent = formatMoney(a);
      taxAmount.textContent = formatMoney(taxVal);
      tipAmount.textContent = formatMoney(tipVal);
      finalAmount.textContent = formatMoney(total);
    }

    document.getElementById('calcBtn').addEventListener('click', calculate);
    [amount, people, tax, tip].forEach(el => {
      el.addEventListener('input', calculate);
    });

    calculate();
  </script>
</body>
</html>
