<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دوز - SA APPS</title>
  <style>
    @font-face{
      font-family:"VazirmatnLocal";
      src:url("fonts/Vazirmatn-Regular.woff2") format("woff2");
      font-weight:400; font-style:normal; font-display:swap;
    }

    :root{
      --bg:#0b1220;
      --bg2:#0f172a;
      --text:#e8eefc;
      --muted:#9fb0d0;
      --accent:#6ea8fe;
      --accent2:#8b5cf6;
      --border:rgba(255,255,255,.08);
      --glass:blur(14px);
      --shadow:0 18px 50px rgba(0,0,0,.45);
    }

    body {
      margin: 0; padding: 0; width: 100%; min-height: 100vh;
      font-family: "VazirmatnLocal", sans-serif;
      background: #0b1220;
      background-image: 
        radial-gradient(circle at top left, rgba(110,168,254,.20), transparent 28%),
        radial-gradient(circle at bottom right, rgba(139,92,246,.18), transparent 34%);
      background-attachment: fixed;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      overflow-x: hidden;
    }

    .container { width: min(450px, 90%); padding: 20px; }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      backdrop-filter: var(--glass);
      border-radius: 32px;
      padding: 24px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 { font-size: 24px; margin-bottom: 8px; }
    p.status { color: var(--muted); font-size: 14px; margin-bottom: 24px; height: 20px; }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .cell {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: bold;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .cell:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }
    .cell.x { color: var(--accent); }
    .cell.o { color: var(--accent2); }

    .controls {
      display: flex; flex-direction: column; gap: 12px;
    }

    .mode-switch {
      display: flex; background: rgba(255,255,255,0.05);
      border-radius: 14px; padding: 4px; border: 1px solid var(--border);
    }

    .mode-btn {
      flex: 1; padding: 10px; border: none; background: transparent;
      color: var(--muted); cursor: pointer; border-radius: 10px;
      font-family: inherit; transition: 0.3s;
    }

    .mode-btn.active {
      background: var(--accent); color: #fff;
    }

    .btn-reset {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; border: none; padding: 14px; border-radius: 14px;
      font-family: inherit; font-weight: bold; cursor: pointer;
      transition: transform 0.2s; box-shadow: 0 10px 20px rgba(110,168,254,0.2);
    }

    .btn-reset:active { transform: scale(0.95); }

    .back-link {
      display: inline-block; margin-top: 20px; color: var(--muted);
      text-decoration: none; font-size: 13px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="panel">
    <h1>بازی دوز</h1>
    <p class="status" id="statusText">نوبت بازیکن X</p>

    <div class="game-grid" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <div class="controls">
      <div class="mode-switch">
        <button class="mode-btn active" onclick="setMode('pvp', this)">دونفره</button>
        <button class="mode-btn" onclick="setMode('pva', this)">با ربات</button>
      </div>
      <button class="btn-reset" onclick="resetGame()">شروع مجدد</button>
    </div>

    <a href="index.html" class="back-link">← بازگشت به لانچر</a>
  </div>
</div>

<script>
  let board = ["", "", "", "", "", "", "", "", ""];
  let currentPlayer = "X";
  let gameActive = true;
  let gameMode = "pvp"; // pvp or pva (Player vs AI)

  const statusText = document.getElementById("statusText");
  const cells = document.querySelectorAll(".cell");

  const winningConditions = [
    [0, 1, 2], [3, 4, 5], [6, 7, 8], // افقی
    [0, 3, 6], [1, 4, 7], [2, 5, 8], // عمودی
    [0, 4, 8], [2, 4, 6]             // قطری
  ];

  function handleCellClick(e) {
    const clickedCell = e.target;
    const index = parseInt(clickedCell.getAttribute("data-index"));

    if (board[index] !== "" || !gameActive) return;

    makeMove(index);

    if (gameActive && gameMode === "pva" && currentPlayer === "O") {
      setTimeout(aiMove, 500);
    }
  }

  function makeMove(index) {
    board[index] = currentPlayer;
    cells[index].textContent = currentPlayer;
    cells[index].classList.add(currentPlayer.toLowerCase());
    
    checkResult();
  }

  function aiMove() {
    if (!gameActive) return;
    
    // استراتژی ساده: انتخاب اولین خانه خالی (می‌توانید با Minimax هوشمندتر کنید)
    let emptyCells = board.map((val, idx) => val === "" ? idx : null).filter(val => val !== null);
    if (emptyCells.length > 0) {
      const randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
      makeMove(randomIndex);
    }
  }

  function checkResult() {
    let roundWon = false;
    for (let i = 0; i < winningConditions.length; i++) {
      const [a, b, c] = winningConditions[i];
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        roundWon = true;
        break;
      }
    }

    if (roundWon) {
      statusText.textContent = `بازیکن ${currentPlayer} برنده شد! 🎉`;
      statusText.style.color = "var(--accent)";
      gameActive = false;
      return;
    }

    if (!board.includes("")) {
      statusText.textContent = "مساوی شد! 🤝";
      gameActive = false;
      return;
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";
    statusText.textContent = `نوبت بازیکن ${currentPlayer}`;
  }

  function setMode(mode, btn) {
    gameMode = mode;
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    resetGame();
  }

  function resetGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    currentPlayer = "X";
    gameActive = true;
    statusText.textContent = "نوبت بازیکن X";
    statusText.style.color = "var(--muted)";
    cells.forEach(cell => {
      cell.textContent = "";
      cell.classList.remove("x", "o");
    });
  }

  cells.forEach(cell => cell.addEventListener("click", handleCellClick));
</script>

</body>
</html>
