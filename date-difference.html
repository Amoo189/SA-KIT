<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاصله دو تاریخ | SA‑APPS</title>

<style>
@font-face{
font-family:"VazirmatnLocal";
src:url("fonts/Vazirmatn-Regular.woff2") format("woff2");
font-display:swap;
}

:root{
--bg:#0b1220;
--card:rgba(255,255,255,.06);
--border:rgba(255,255,255,.08);
--text:#e8eefc;
--muted:#9fb0d0;
--accent:#6ea8fe;
--accent2:#8b5cf6;
}

body.light-mode{
--bg:#f4f7fb;
--card:rgba(255,255,255,.85);
--border:rgba(0,0,0,.08);
--text:#111827;
--muted:#6b7280;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
margin:0;
font-family:"VazirmatnLocal",sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

.container{max-width:600px;margin:auto;padding:20px}

.panel{
background:var(--card);
border:1px solid var(--border);
border-radius:24px;
padding:22px;
backdrop-filter:blur(16px);
}

h1{font-size:20px;margin:0 0 20px 0;text-align:center}

.field{margin-bottom:15px}

input{
width:100%;
padding:15px;
border-radius:14px;
border:1px solid var(--border);
background:rgba(255,255,255,.03);
color:var(--text);
font-size:15px;
text-align:center;
cursor:pointer;
}

button.main-btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-family:inherit;
font-size:16px;
font-weight:bold;
background:linear-gradient(135deg,var(--accent),var(--accent2));
color:#fff;
cursor:pointer;
transition:.2s;
}

button.main-btn:active{transform:scale(.97)}

.result{
margin-top:20px;
padding:18px;
border-radius:18px;
background:rgba(110,168,254,.1);
border:1px solid rgba(110,168,254,0.2);
display:none;
}

.big{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--accent)}

/* Calendar Bottom Sheet */
.calendar{
position:fixed;
bottom:0;left:0;right:0;
background:var(--bg);
border-top:1px solid var(--border);
border-radius:24px 24px 0 0;
padding:20px;
transform:translateY(110%);
transition:transform .3s cubic-bezier(0.4, 0, 0.2, 1);
z-index:1000;
max-width:600px;margin:auto;
box-shadow:0 -10px 40px rgba(0,0,0,0.4);
}

.calendar.show{transform:translateY(0)}

.cal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.cal-title{font-size:17px;font-weight:bold}

.nav-btn{
background:rgba(255,255,255,0.05);
border:none;
color:var(--text);
width:35px;height:35px;
border-radius:10px;
cursor:pointer;
}

.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
text-align:center;
font-size:12px;
color:var(--muted);
margin-bottom:10px;
}

.cal-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
}

.day{
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
font-size:14px;
}

.day:hover:not(.empty){background:rgba(110,168,254,0.1)}

.today{border:1px solid var(--accent);color:var(--accent);font-weight:bold}

.selected{background:var(--accent) !important;color:#fff !important}

.empty{cursor:default}

.overlay{
position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
display:none;z-index:999;
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeCalendar()"></div>

<div class="container">
    <div class="panel">
        <h1>📅 فاصله دو تاریخ شمسی</h1>
        
        <div class="field">
            <input id="date1" placeholder="تاریخ شروع" readonly>
        </div>

        <div class="field">
            <input id="date2" placeholder="تاریخ پایان" readonly>
        </div>

        <button class="main-btn" onclick="calculate()">محاسبه فاصله</button>

        <div class="result" id="resultBox">
            <div class="big" id="exactResult"></div>
            <div id="stats" style="font-size:14px; color:var(--muted); line-height:2"></div>
        </div>
    </div>
</div>

<div class="calendar" id="calendar">
    <div class="cal-header">
        <button class="nav-btn" onclick="prevMonth()">‹</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="nav-btn" onclick="nextMonth()">›</button>
        <button class="nav-btn" onclick="gotoToday()">⦿</button>
    </div>

    <div class="weekdays">
        <div>ش</div><div>ی</div><div>د</div><div>س</div><div>چ</div><div>پ</div><div>ج</div>
    </div>

    <div class="cal-grid" id="calDays"></div>
</div>

<script>
/* --- Jalali Engine --- */
function isLeap(y){ return ((y+38)*682)%2816<682; }
function getMonthDays(y,m){ return (m<=6)?31:(m<=11)?30:isLeap(y)?30:29; }

// یافتن روز هفته اول ماه (۰ برای شنبه، ۶ برای جمعه)
function getFirstDayOfMonth(y,m){
    let g = jalaliToGregorian(y,m,1);
    let d = new Date(g.gy, g.gm-1, g.gd).getDay();
    return (d + 1) % 7; // تبدیل یکشنبه-محور به شنبه-محور
}

function gregorianToJalali(gy,gm,gd){
    let g_d_m=[0,31,59,90,120,151,181,212,243,273,304,334];
    let jy=(gy<=1600)?0:979; gy-=(gy<=1600)?621:1600;
    let gy2=(gm>2)?(gy+1):gy;
    let days=(365*gy)+(Math.floor((gy2+3)/4))-(Math.floor((gy2+99)/100))+(Math.floor((gy2+399)/400))-80+gd+g_d_m[gm-1];
    jy+=33*Math.floor(days/12053); days%=12053;
    jy+=4*Math.floor(days/1461); days%=1461;
    if(days>365){jy+=Math.floor((days-1)/365); days=(days-1)%365;}
    let jm=(days<186)?1+Math.floor(days/31):7+Math.floor((days-186)/30);
    let jd=1+((days<186)?(days%31):((days-186)%30));
    return {jy,jm,jd};
}

function jalaliToGregorian(jy,jm,jd){
    jy+=1595;
    let days=-355668+(365*jy)+Math.floor(jy/33)*8+Math.floor(((jy%33)+3)/4)+jd+(jm<7?(jm-1)*31:((jm-7)*30)+186);
    let gy=400*Math.floor(days/146097); days%=146097;
    if(days>36524){gy+=100*Math.floor(--days/36524); days%=36524; if(days>=365)days++;}
    gy+=4*Math.floor(days/1461); days%=1461;
    if(days>365){gy+=Math.floor((days-1)/365); days=(days-1)%365;}
    let gd=days+1;
    let sal=[0,31,((gy%4===0&&gy%100!==0)||gy%400===0)?29:28,31,30,31,30,31,31,30,31,30,31];
    let gm; for(gm=0;gm<13;gm++){if(gd<=sal[gm])break; gd-=sal[gm];}
    return {gy,gm,gd};
}

/* --- UI Logic --- */
const now = new Date();
const todayJ = gregorianToJalali(now.getFullYear(), now.getMonth()+1, now.getDate());
let cy = todayJ.jy, cm = todayJ.jm;
let activeInput = null;

const calendar = document.getElementById("calendar");
const overlay = document.getElementById("overlay");

document.getElementById("date1").onclick = () => openCal("date1");
document.getElementById("date2").onclick = () => openCal("date2");

function openCal(id){
    activeInput = document.getElementById(id);
    calendar.classList.add("show");
    overlay.style.display = "block";
    render();
}

function closeCalendar(){
    calendar.classList.remove("show");
    overlay.style.display = "none";
}

function render(){
    const months = ["فروردین","اردیبهشت","خرداد","تیر","مرداد","شهریور","مهر","آبان","آذر","دی","بهمن","اسفند"];
    document.getElementById("calTitle").innerText = months[cm-1] + " " + cy;
    
    const grid = document.getElementById("calDays");
    grid.innerHTML = "";

    let firstDay = getFirstDayOfMonth(cy, cm);
    let totalDays = getMonthDays(cy, cm);

    // خانه‌های خالی برای شروع ماه
    for(let i=0; i<firstDay; i++){
        let div = document.createElement("div");
        div.className = "day empty";
        grid.appendChild(div);
    }

    // روزهای ماه
    for(let d=1; d<=totalDays; d++){
        let div = document.createElement("div");
        div.className = "day";
        div.innerText = d;
        if(cy===todayJ.jy && cm===todayJ.jm && d===todayJ.jd) div.classList.add("today");
        
        div.onclick = () => {
            activeInput.value = cy + "/" + String(cm).padStart(2,'0') + "/" + String(d).padStart(2,'0');
            closeCalendar();
        };
        grid.appendChild(div);
    }
}

function prevMonth(){ cm--; if(cm<1){cm=12; cy--;} render(); }
function nextMonth(){ cm++; if(cm>12){cm=1; cy++;} render(); }
function gotoToday(){ cy=todayJ.jy; cm=todayJ.jm; render(); }

function calculate(){
    const d1 = document.getElementById("date1").value.split("/");
    const d2 = document.getElementById("date2").value.split("/");
    if(d1.length<3 || d2.length<3) return;

    let v1 = jalaliToGregorian(+d1[0],+d1[1],+d1[2]);
    let v2 = jalaliToGregorian(+d2[0],+d2[1],+d2[2]);
    
    let dateObj1 = new Date(v1.gy, v1.gm-1, v1.gd);
    let dateObj2 = new Date(v2.gy, v2.gm-1, v2.gd);
    
    let diffTime = Math.abs(dateObj2 - dateObj1);
    let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    // محاسبه دقیق سال/ماه/روز
    let y1=+d1[0], m1=+d1[1], day1=+d1[2];
    let y2=+d2[0], m2=+d2[1], day2=+d2[2];
    if(dateObj1 > dateObj2) { [y1,y2]=[y2,y1]; [m1,m2]=[m2,m1]; [day1,day2]=[day2,day1]; }

    let dy = y2 - y1;
    let dm = m2 - m1;
    let dd = day2 - day1;

    if(dd < 0) { dm--; dd += getMonthDays(y2, m2-1 || 12); }
    if(dm < 0) { dy--; dm += 12; }

    document.getElementById("exactResult").innerText = `${dy} سال، ${dm} ماه، ${dd} روز`;
    
    let gEnd = jalaliToGregorian(y2, m2, day2);
    let doy = 0; for(let i=1; i<m2; i++) doy+=getMonthDays(y2,i); doy+=day2;

    document.getElementById("stats").innerHTML = `
        مجموع روزها: ${diffDays} روز <br>
        معادل میلادی پایان: ${gEnd.gy}/${gEnd.gm}/${gEnd.gd} <br>
        روزِ سال: ${doy} | هفته: ${Math.ceil(doy/7)}
    `;
    document.getElementById("resultBox").style.display = "block";
}

// تنظیم تم
(function(){
    const theme = localStorage.getItem("sa-apps-theme") || "dark";
    document.body.classList.add(theme + "-mode");
})();
</script>
</body>
</html>
