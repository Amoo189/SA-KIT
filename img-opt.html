<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بهینه‌ساز تصویر | SA-APPS</title>
  <style>
    @font-face { 
      font-family: "VazirmatnLocal"; 
      src: url("fonts/Vazirmatn-Regular.woff2") format("woff2"); 
    }
    :root {
      --bg: #0b1220; --text: #e8eefc; --muted: #9fb0d0;
      --accent: #6ea8fe; --accent2: #8b5cf6; --border: rgba(255, 255, 255, 0.08);
      --glass: blur(14px); --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "VazirmatnLocal", sans-serif; background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: flex-start; padding: 12px; min-height: 100vh;
    }
    
    /* کانتینر اصلی کاملاً ریسپانسیو */
    .panel {
      width: 100%; max-width: 550px; background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border); backdrop-filter: var(--glass);
      border-radius: 24px; padding: 18px; box-shadow: var(--shadow);
      margin-top: 10px;
    }
    
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .badge { 
      width: 44px; height: 44px; border-radius: 12px; 
      background: linear-gradient(135deg, var(--accent), var(--accent2)); 
      display: grid; place-items: center; font-weight: bold; font-size: 18px; 
    }
    
    /* 📱 منطقه آپلود کاملاً ریسپانسیو و بهینه برای موبایل */
    .upload-area {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 2px dashed var(--border); border-radius: 18px; 
      padding: 24px 15px; text-align: center; cursor: pointer; 
      transition: all 0.3s ease; background: rgba(255, 255, 255, 0.01); margin-bottom: 20px;
    }
    .upload-area:hover { 
      border-color: var(--accent); background: rgba(110, 168, 254, 0.04); 
      transform: translateY(-2px);
    }
    .upload-icon { font-size: 32px; margin-bottom: 10px; transition: 0.3s; }
    .upload-area:hover .upload-icon { transform: scale(1.1); }
    
    #fileName { 
      margin: 0 0 10px 0; font-size: 13px; color: var(--text); 
      word-break: break-all; max-width: 100%; line-height: 1.6;
    }
    
    /* دکمه راهنما داخل باکس آپلود برای موبایل */
    .upload-btn-indicator {
      display: inline-block; font-size: 11px; background: rgba(255, 255, 255, 0.08);
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      color: var(--accent); transition: 0.3s; font-weight: bold;
    }
    .upload-area:hover .upload-btn-indicator {
      background: var(--accent); color: #000; border-color: var(--accent);
    }

    /* گرید تنظیمات */
    .settings-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }
    @media (min-width: 400px) { .settings-grid { grid-template-columns: 1fr 1fr; } }
    
    .control { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 12px; color: var(--muted); }
    input[type="number"], input[type="range"] {
      width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px; color: var(--text); font-family: inherit; font-size: 13px;
    }
    input[type="range"] { padding: 0; cursor: pointer; }

    /* کادر پیش‌نمایش */
    .preview-container { display: none; background: rgba(0,0,0,0.2); border-radius: 16px; padding: 15px; text-align: center; margin-top: 15px; }
    img { max-width: 100%; height: auto; max-height: 250px; object-fit: contain; border-radius: 10px; margin-bottom: 12px; border: 1px solid var(--border); }
    .stats { font-size: 12px; color: var(--accent); margin-bottom: 12px; font-weight: bold; }
    
    /* دکمه اصلی دانلود */
    .btn {
      width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; border: none; padding: 13px; border-radius: 10px; font-weight: bold;
      cursor: pointer; transition: 0.3s; font-size: 14px;
    }
    .btn:active { transform: scale(0.97); }
    
    .footer-name { text-align: center; margin-top: 25px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 12px; }
    input[type="file"] { display: none; }

    /* ریسپانسیو دسکتاپ و تبلت برای پدینگ و سایزها */
    @media (min-width: 600px) {
      .panel { padding: 25px; margin-top: 30px; }
      body { padding: 20px; }
      .upload-area { padding: 35px 20px; }
      .upload-icon { font-size: 40px; }
      #fileName { font-size: 14px; }
    }
  </style>
</head>
<body>

  <div class="panel">
    <div class="header">
      <div class="badge">SA</div>
      <div>
        <h1 style="margin:0; font-size:18px;">بهینه‌ساز تصویر</h1>
        <p style="margin:0; font-size:11px; color:var(--muted);">کاهش حجم هوشمند آفلاین</p>
      </div>
    </div>

    <!-- فیلد آپلود بهینه‌سازی شده -->
    <label class="upload-area" id="dropZone">
      <input type="file" id="fileInput" accept="image/*">
      <div class="upload-icon">🖼️</div>
      <p id="fileName">برای انتخاب تصویر ضربه بزنید</p>
      <span class="upload-btn-indicator">انتخاب فایل</span>
    </label>

    <div class="settings-grid">
      <div class="control">
        <label>کیفیت (%): <span id="qVal">80</span></label>
        <input type="range" id="quality" min="10" max="100" value="80">
      </div>
      <div class="control">
        <label>حداکثر عرض (px)</label>
        <input type="number" id="maxWidth" placeholder="اصلی">
      </div>
    </div>

    <div class="preview-container" id="previewWrap">
      <div class="stats" id="info">حجم اصلی: - | حجم جدید: -</div>
      <img id="previewImg" src="">
      <button class="btn" id="downloadBtn">دانلود نسخه بهینه</button>
    </div>

    <div class="footer-name">SA‑APPS | ساخته شده توسط صالح عمو</div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const quality = document.getElementById('quality');
    const qVal = document.getElementById('qVal');
    const maxWidth = document.getElementById('maxWidth');
    const previewWrap = document.getElementById('previewWrap');
    const previewImg = document.getElementById('previewImg');
    const info = document.getElementById('info');
    const downloadBtn = document.getElementById('downloadBtn');

    let originalFile = null;

    quality.oninput = () => { qVal.innerText = quality.value; if(originalFile) processImage(); };
    maxWidth.onchange = () => { if(originalFile) processImage(); };

    fileInput.onchange = (e) => {
      originalFile = e.target.files[0];
      if(originalFile) {
        document.getElementById('fileName').innerText = originalFile.name;
        processImage();
      }
    };

    function processImage() {
      const reader = new FileReader();
      reader.readAsDataURL(originalFile);
      reader.onload = event => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;

          const maxW = parseInt(maxWidth.value);
          if (maxW && width > maxW) {
            height *= maxW / width;
            width = maxW;
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          const dataUrl = canvas.toDataURL('image/jpeg', quality.value / 100);
          previewImg.src = dataUrl;
          previewWrap.style.display = 'block';

          const oldSize = (originalFile.size / 1024).toFixed(1);
          const newSize = (Math.round((dataUrl.length * 0.75) / 1024)).toFixed(1);
          info.innerText = `حجم اصلی: ${oldSize}KB | حجم جدید: ${newSize}KB`;

          downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `optimized_${originalFile.name.split('.')[0]}.jpg`;
            link.href = dataUrl;
            link.click();
          };
        };
      };
    }
  </script>
</body>
</html>
