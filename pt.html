<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جدول تناوبی</title>

<style>

:root{
--bg1:#08131f;
--bg2:#02060c;
--card:rgba(255,255,255,0.05);
--text:#ffffff;
--focus:#071a2c;
--border:rgba(255,255,255,0.15);
--glow:#00eaff;
}

.light{
--bg1:#eaf6ff;
--bg2:#cfe9ff;
--card:#ffffff;
--text:#001018;
--focus:#ffffff;
--border:#c7d9e5;
--glow:#0088cc;
}

body{
margin:0;
font-family:tahoma;
background:radial-gradient(circle at top,var(--bg1),var(--bg2));
color:var(--text);
transition:.4s;
overflow-x:hidden;
}

/* header */

header{
text-align:center;
padding:15px;
font-size:24px;
color:var(--glow);
}

/* button */

.controls{
text-align:center;
margin-bottom:10px;
}

button{
background:var(--card);
color:var(--text);
border:1px solid var(--border);
padding:6px 12px;
border-radius:8px;
cursor:pointer;
}

/* ✅ wrapper for horizontal scroll */

.table-wrapper{
width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
}

/* table */

#table{
display:grid;
grid-template-columns:repeat(18,65px);
gap:6px;
padding:10px;
width:max-content;
margin:auto;
}

/* element */

.element{
background:var(--card);
border-radius:10px;
padding:4px;
text-align:center;
cursor:pointer;
border:1px solid var(--border);
min-height:65px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:.2s;
}

.symbol{
font-size:18px;
font-weight:bold;
}

.number{
font-size:9px;
}

.name,.mass{
display:none;
}

/* categories */

.alkali{background:#ff595e}
.alkaline{background:#ff924c}
.transition{background:#ffca3a}
.metalloid{background:#8ac926}
.nonmetal{background:#00c2ff}
.halogen{background:#c77dff}
.noble{background:#00f5d4}
.lanthanoid{background:#ff66c4}
.actinoid{background:#ff006e}

/* f block */

#fblock{
margin-top:25px;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.frow{
display:grid;
grid-template-columns:repeat(15,65px);
gap:6px;
width:max-content;
}

/* overlay */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

#focus{
width:95%;
max-width:420px;
background:var(--focus);
border-radius:18px;
padding:20px;
max-height:90vh;
overflow-y:auto;
}

#content{
direction:rtl;
text-align:right;
font-size:14px;
}

.bigSymbol{
font-size:60px;
color:var(--glow);
text-align:center;
}

.bigName{
font-size:20px;
margin-bottom:10px;
text-align:center;
}

.info{
margin:4px 0;
}

#close{
cursor:pointer;
color:red;
font-size:18px;
text-align:left;
}

canvas{
margin-top:10px;
max-width:100%;
}

/* ✅ desktop restores full layout */

@media(min-width:900px){

.name,.mass{
display:block;
font-size:10px;
}

.element{
min-height:75px;
}

}

</style>
</head>

<body>

<header>⚛ جدول تناوبی عناصر ⚛</header>

<div class="controls">
<button id="themeBtn">تغییر حالت شب / روز</button>
</div>

<div class="table-wrapper">
<div id="table"></div>
</div>

<div id="fblock">

<div class="table-wrapper">

</div>

</div>

</div>

<div id="overlay">
<div id="focus">
<div id="close">✕</div>
<div id="content"></div>

</div>
</div>

<script>

const table=document.getElementById("table")
const lan=document.getElementById("lan")
const act=document.getElementById("act")

function card(el){

const d=document.createElement("div")
d.className="element "+el.category

d.innerHTML=`
<div class="number">${el.number}</div>
<div class="symbol">${el.symbol}</div>
<div class="name">${el.name}</div>
<div class="mass">${el.atomic_mass}</div>
`

d.onclick=()=>focusElement(el)
return d
}

elements.forEach(el=>{

if(el.number>=57&&el.number<=71){
lan.appendChild(card(el))
}
else if(el.number>=89&&el.number<=103){
act.appendChild(card(el))
}
else{
const c=card(el)
c.style.gridColumn=el.group
c.style.gridRow=el.period
table.appendChild(c)
}

})

document.getElementById("themeBtn").onclick=()=>{
document.body.classList.toggle("light")
}

const overlay=document.getElementById("overlay")
const content=document.getElementById("content")

function focusElement(el){

overlay.style.display="flex"

content.innerHTML=`

document.getElementById("close").onclick=()=>{
overlay.style.display="none"
}

overlay.onclick=e=>{
if(e.target===overlay) overlay.style.display="none"
}

/* Bohr Model */

function shells(Z){
const caps=[2,8,18,32,32,18,8]
let res=[]
let i=0
while(Z>0){
let e=Math.min(caps[i],Z)
res.push(e)
Z-=e
i++
}
return res
}

const ctx=document.getElementById("atom").getContext("2d")
let angle=0

function drawAtom(Z){

const sh=shells(Z)

function loop(){

ctx.clearRect(0,0,220,220)

const cx=110
const cy=110

ctx.beginPath()
ctx.arc(cx,cy,10,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

sh.forEach((e,i)=>{

const r=25+i*18

ctx.strokeStyle="#00eaff"
ctx.beginPath()
ctx.arc(cx,cy,r,0,Math.PI*2)
ctx.stroke()

for(let k=0;k<e;k++){
const a=(k/e)*Math.PI*2+angle
const x=cx+Math.cos(a)*r
const y=cy+Math.sin(a)*r
ctx.beginPath()
ctx.arc(x,y,3,0,Math.PI*2)
ctx.fillStyle="#7df9ff"
ctx.fill()
}

})

angle+=0.01
requestAnimationFrame(loop)
}

loop()
}

</script>
