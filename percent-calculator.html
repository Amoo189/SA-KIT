<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محاسبه‌گر درصد | SA-APPS</title>
  <style>
    @font-face{
      font-family:"VazirmatnLocal";
      src:url("fonts/Vazirmatn-Regular.woff2") format("woff2");
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }
    @font-face{
      font-family:"VazirmatnLocal";
      src:url("fonts/Vazirmatn-Bold.woff2") format("woff2");
      font-weight:700;
      font-style:normal;
      font-display:swap;
    }

    :root{
      --bg:#0b1220; --bg2:#0f172a; --text:#e8eefc; --muted:#9fb0d0;
      --accent:#6ea8fe; --accent2:#8b5cf6; --border:rgba(255,255,255,.08);
      --shadow:0 18px 50px rgba(0,0,0,.45); --glass:blur(14px);
      --bg-light:#f0f4f9; --bg2-light:#dbe2ee; --text-light:#1a202c;
      --muted-light:#6b7280; --border-light:rgba(0,0,0,.12); --shadow-light:0 10px 30px rgba(0,0,0,.12);
    }

    body.light-mode{
      --bg:var(--bg-light); --bg2:var(--bg2-light); --text:var(--text-light);
      --muted:var(--muted-light); --border:var(--border-light); --shadow:var(--shadow-light);
      background: radial-gradient(circle at top left, rgba(110,168,254,.15), transparent 28%),
                  radial-gradient(circle at bottom right, rgba(139,92,246,.12), transparent 34%),
                  linear-gradient(180deg, #e2e8f0, #f8fafc 45%, #e2e8f0 100%);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0; min-height:100vh; font-family:"VazirmatnLocal",sans-serif;
      background:#0b1220;
      background-image:radial-gradient(circle at top left, rgba(110,168,254,.20), transparent 28%),radial-gradient(circle at bottom right, rgba(139,92,246,.18), transparent 34%);
      background-attachment:fixed; color:var(--text);
    }

    .container{width:min(980px,100%);margin:auto;padding:20px;position:relative}
    .panel{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid var(--border); backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
      border-radius:32px; box-shadow:var(--shadow); padding:28px;
    }
    .light-mode .panel{background:linear-gradient(180deg, rgba(255,255,255,.3), rgba(255,255,255,.1))}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:24px}
    .topbar-left{display:flex;align-items:center;gap:14px}
    .brand-badge{
      width:58px;height:58px;border-radius:18px;display:grid;place-items:center;
      background:linear-gradient(135deg, rgba(110,168,254,.28), rgba(139,92,246,.24));
      border:1px solid rgba(255,255,255,.10);font-weight:800;font-size:24px;
    }
    .brand-title h1{margin:0;font-size:24px}
    .brand-title p{margin:0;color:var(--muted);font-size:14px}
    .topbar-right{display:flex;gap:12px;flex-wrap:wrap}
    .theme-switcher,.action-btn{
      border:1px solid var(--border); background:rgba(255,255,255,.05); color:var(--text);
      border-radius:14px; cursor:pointer; font-family:inherit; transition:.25s ease;
      backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
    }
    .theme-switcher{width:48px;height:48px;display:grid;place-items:center}
    .action-btn{padding:11px 16px;text-decoration:none}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--border); border-radius:24px; padding:20px;
    }
    .light-mode .card{background:linear-gradient(180deg, rgba(255,255,255,.3), rgba(255,255,255,.1))}
    .card h3{margin-top:0}
    input{
      width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--border);
      background:rgba(255,255,255,.05);color:var(--text);font-family:inherit;outline:none;margin-bottom:10px;
    }
    .light-mode input,.light-mode .theme-switcher,.light-mode .action-btn{background:rgba(0,0,0,.05);border-color:var(--border-light)}
    .btn-primary{
      width:100%;padding:12px 16px;border:none;border-radius:14px;cursor:pointer;
      background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:inherit;
    }
    .result{
      margin-top:12px;padding:14px;border-radius:14px;background:rgba(255,255,255,.05);
      border:1px solid var(--border);color:var(--muted);line-height:1.9;
    }
    .footer{text-align:center;padding:24px 0;margin-top:28px;font-size:13px;color:var(--muted);border-top:1px solid var(--border)}
  </style>
</head>
<body>
  <div class="container">
    <section class="panel">
      <div class="topbar">
        <div class="topbar-left">
          <div class="brand-badge">📐</div>
          <div class="brand-title">
            <h1>محاسبه‌گر درصد</h1>
            <p>سه حالت پرکاربرد برای محاسبات درصدی</p>
          </div>
        </div>
        <div class="topbar-right">
          <button class="theme-switcher" onclick="toggleTheme()">🌓</button>
          <a class="action-btn" href="index.html">بازگشت ←</a>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h3>چند درصدِ یک عدد</h3>
          <input id="p1" type="number" placeholder="درصد">
          <input id="n1" type="number" placeholder="عدد">
          <button class="btn-primary" onclick="calc1()">محاسبه</button>
          <div class="result" id="r1">نتیجه: —</div>
        </div>

        <div class="card">
          <h3>یک عدد چند درصدِ عدد دیگر است؟</h3>
          <input id="n2a" type="number" placeholder="عدد اول">
          <input id="n2b" type="number" placeholder="عدد دوم">
          <button class="btn-primary" onclick="calc2()">محاسبه</button>
          <div class="result" id="r2">نتیجه: —</div>
        </div>

        <div class="card">
          <h3>افزایش یا کاهش درصدی</h3>
          <input id="n3" type="number" placeholder="عدد اصلی">
          <input id="p3" type="number" placeholder="درصد تغییر">
          <button class="btn-primary" onclick="calc3()">محاسبه</button>
          <div class="result" id="r3">نتیجه: —</div>
        </div>
      </div>
    </section>
    <footer class="footer">SA‑APPS &copy; 2026</footer>
  </div>

  <script>
    const theme = localStorage.getItem("sa-apps-theme") || "dark";
    applyTheme(theme);

    function applyTheme(mode){
      document.body.classList.remove("dark-mode","light-mode");
      document.body.classList.add(mode + "-mode");
      localStorage.setItem("sa-apps-theme", mode);
    }
    function toggleTheme(){
      const isLight = document.body.classList.contains("light-mode");
      applyTheme(isLight ? "dark" : "light");
    }

    function calc1(){
      const p = parseFloat(document.getElementById("p1").value);
      const n = parseFloat(document.getElementById("n1").value);
      document.getElementById("r1").textContent =
        (isNaN(p)||isNaN(n)) ? "نتیجه: ورودی نامعتبر" : "نتیجه: " + ((p/100)*n);
    }

    function calc2(){
      const a = parseFloat(document.getElementById("n2a").value);
      const b = parseFloat(document.getElementById("n2b").value);
      document.getElementById("r2").textContent =
        (isNaN(a)||isNaN(b)||b===0) ? "نتیجه: ورودی نامعتبر" : "نتیجه: " + ((a/b)*100).toFixed(2) + "٪";
    }

    function calc3(){
      const n = parseFloat(document.getElementById("n3").value);
      const p = parseFloat(document.getElementById("p3").value);
      if(isNaN(n)||isNaN(p)){
        document.getElementById("r3").textContent = "نتیجه: ورودی نامعتبر";
        return;
      }
      const inc = n + (n*p/100);
      const dec = n - (n*p/100);
      document.getElementById("r3").innerHTML = `افزایش: ${inc}<br>کاهش: ${dec}`;
    }
  </script>
</body>
</html>
