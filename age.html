<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محاسبه‌گر سن شمسی | SA-APPS</title>
  <style>
    :root{
      --bg:#0b1220; --bg2:#0f172a; --text:#e8eefc; --muted:#9fb0d0;
      --accent:#6ea8fe; --accent2:#8b5cf6; --border:rgba(255,255,255,.08);
      --glass:blur(14px); --radius:24px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh; font-family:Tahoma, sans-serif;
      color:var(--text); background:radial-gradient(circle at top left, rgba(110,168,254,.18), transparent 28%), radial-gradient(circle at bottom right, rgba(139,92,246,.16), transparent 34%), linear-gradient(180deg,#09111d,#0b1220);
      display:flex; align-items:center; justify-content:center; padding:18px;
    }
    .app{ width:100%; max-width:440px; background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03)); border:1px solid var(--border); border-radius:28px; padding:20px; backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass); }
    .header{ text-align:center; margin-bottom:18px; }
    .icon{ width:68px; height:68px; margin:0 auto 12px; border-radius:20px; display:grid; place-items:center; font-size:30px; background:linear-gradient(135deg, rgba(245,158,11,.22), rgba(139,92,246,.22)); border:1px solid rgba(255,255,255,.08); }
    h1{ margin:0; font-size:22px; }
    .subtitle{ margin-top:8px; color:var(--muted); font-size:13px; }
    .card{ background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:20px; padding:16px; margin-top:16px; }
    .label{ display:block; margin-bottom:10px; color:#dbe7ff; font-size:14px; }
    
    /* استایل بهبود یافته برای ورودی‌ها */
    .date-inputs{ display:grid; grid-template-columns:1.5fr 1fr 1fr; gap:8px; }
    select{ width:100%; appearance:none; background:rgba(255,255,255,.06); border:1px solid var(--border); color:var(--text); border-radius:14px; padding:12px; font-size:14px; text-align:center; outline:none; transition:.2s; }
    select:focus{ border-color:var(--accent); background:rgba(255,255,255,.1); }
    
    .actions{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
    .btn{ border:none; border-radius:14px; padding:12px; font-weight:bold; cursor:pointer; color:#fff; transition:.2s; }
    .btn:active{ transform:scale(.98); }
    .btn-calc{ background:linear-gradient(135deg, #f59e0b, #8b5cf6); }
    .btn-reset{ background:linear-gradient(135deg, #334155, #475569); }
    
    .result{ margin-top:18px; display:none; }
    .result.show{ display:block; }
    .main-result{ padding:16px; border-radius:20px; text-align:center; background:rgba(255,255,255,.05); border:1px solid var(--border); margin-bottom:12px; }
    .main-age{ font-size:22px; font-weight:bold; color:#fff; margin-bottom:4px; }
    .stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .stat{ background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:16px; padding:10px 5px; text-align:center; }
    .stat-number{ font-size:16px; font-weight:bold; color:#f8fafc; }
    .stat-label{ font-size:10px; color:var(--muted); margin-top:2px; }
    .back-link{ display:block; text-align:center; margin-top:18px; color:#cbd5e1; text-decoration:none; font-size:13px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="icon">🎂</div>
      <h1>محاسبه‌گر سن (شمسی)</h1>
      <div class="subtitle">تاریخ تولد خود را به شمسی وارد کنید.</div>
    </div>

    <div class="card">
      <label class="label">تاریخ تولد</label>
      <div class="date-inputs">
        <select id="year"></select>
        <select id="month"></select>
        <select id="day"></select>
      </div>

      <div class="actions">
        <button class="btn btn-calc" onclick="calculateAge()">محاسبه</button>
        <button class="btn btn-reset" onclick="resetAge()">پاک کردن</button>
      </div>
    </div>

    <div class="result" id="resultBox">
      <div class="main-result">
        <div class="main-age" id="mainAge">-</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-number" id="totalMonths">0</div><div class="stat-label">ماه</div></div>
        <div class="stat"><div class="stat-number" id="totalWeeks">0</div><div class="stat-label">هفته</div></div>
        <div class="stat"><div class="stat-number" id="totalDays">0</div><div class="stat-label">روز</div></div>
      </div>
    </div>
    <a class="back-link" href="index.html">← بازگشت</a>
  </div>

  <script>
    // --- منطق تقویم شمسی ---
    const jalaali = {
        toGregorian: function(jy, jm, jd) {
            jy += 1595; var days = -355668 + (365 * jy) + (~~(jy / 33) * 8) + ~~(((jy % 33) + 3) / 4) + jd + ((jm < 7) ? (jm - 1) * 31 : ((jm - 7) * 30) + 186);
            var gy = 400 * ~~(days / 146097); days %= 146097;
            if (days > 36524) { gy += 100 * ~~(--days / 36524); days %= 36524; if (days >= 365) days++; }
            gy += 4 * ~~(days / 1461); days %= 1461;
            if (days > 365) { gy += ~~((days - 1) / 365); days = (days - 1) % 365; }
            var gd = days + 1, gm = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
            for (var i = 11; i >= 0; i--) if (days >= gm[i]) { gd = days - gm[i] + 1; gm = i + 1; break; }
            return { gy: gy, gm: gm, gd: gd };
        }
    };

    // پر کردن منوهای انتخابی
    function initSelects() {
        const yearSelect = document.getElementById('year');
        const monthSelect = document.getElementById('month');
        const daySelect = document.getElementById('day');
        
        for (let i = 1402; i >= 1300; i--) yearSelect.add(new Option(i, i));
        for (let i = 1; i <= 12; i++) monthSelect.add(new Option(i, i));
        for (let i = 1; i <= 31; i++) daySelect.add(new Option(i, i));
    }
    
    initSelects();

    function calculateAge() {
        const jy = parseInt(document.getElementById('year').value);
        const jm = parseInt(document.getElementById('month').value);
        const jd = parseInt(document.getElementById('day').value);
        
        const gDate = jalaali.toGregorian(jy, jm, jd);
        const birthDate = new Date(gDate.gy, gDate.gm - 1, gDate.gd);
        const today = new Date();
        
        if (birthDate > today) { alert("تاریخ تولد نمی‌تواند در آینده باشد."); return; }
        
        let diff = today - birthDate;
        let ageDate = new Date(diff);
        let years = Math.abs(ageDate.getUTCFullYear() - 1970);
        let months = ageDate.getUTCMonth();
        let days = ageDate.getUTCDate() - 1;
        
        document.getElementById("mainAge").textContent = `${years} سال، ${months} ماه، ${days} روز`;
        document.getElementById("totalMonths").textContent = (years * 12) + months;
        document.getElementById("totalDays").textContent = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById("totalWeeks").textContent = Math.floor(diff / (1000 * 60 * 60 * 24 * 7));
        document.getElementById("resultBox").classList.add("show");
    }

    function resetAge(){ document.getElementById("resultBox").classList.remove("show"); }
  </script>
</body>
</html>
